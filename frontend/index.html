<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Cadastro de Produtos</h1>

    <form id="form-produto">
        <div>
            <label>Nome do Produto:</label>
            <input type="text" id="nome" required placeholder="Digite o nome!">
        </div>
        <div>
            <label>Categoria:</label>
            <input type="text" id="categoria" required placeholder="Insira a categoria!">
        </div>
        <div>
            <label>Preço:</label>
            <input type="number" id="preco" required step="0.01" min="0.01" placeholder="Digite o preço (R$)">
        </div>
        <div>
            <label>Estoque:</label>
            <input type="number" id="estoque" required min="0" placeholder="Digite o estoque!">
        </div>
        <button type="submit">Cadastrar</button>
    </form>

    <h2>Produtos Cadastrados</h2>
    <table border="1" style="width:100%">
        <thead>
            <tr>
                <th>Nome do Produto</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Excluir</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
    </table>
 
    <script src="script.js"></script>
</body>
</html>
